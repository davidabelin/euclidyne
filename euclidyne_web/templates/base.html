<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_display_name }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Baskervville:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/labs.css') }}">
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>
    <header class="site-header">
      <div class="brand-wrap">
        <a class="brand" href="{{ url_for('main.home') }}">{{ app_display_name }}</a>
        <p class="brand-subtitle">{{ app_tagline }}</p>
      </div>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ url_for('main.home') }}" class="{% if active == 'home' %}active{% endif %}">Home</a>
        <a href="{{ url_for('main.quick') }}" class="{% if active == 'quick' %}active{% endif %}">Quick</a>
        <a href="{{ url_for('main.explorer') }}" class="{% if active == 'explorer' %}active{% endif %}">Explorer</a>
        <a href="{{ url_for('main.continued_fractions') }}" class="{% if active == 'continued_fractions' %}active{% endif %}">CF + Geometry</a>
        <a href="{{ url_for('main.phase') }}" class="{% if active == 'phase' %}active{% endif %}">Phase Lab</a>
        <a href="{{ url_for('main.references') }}" class="{% if active == 'references' %}active{% endif %}">References</a>
        <a href="{{ aix_hub_url }}">Back to AIX Hub</a>
      </nav>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-copy">GNU copyright 2026 AIX Protodyne</p>
        <nav class="footer-links" aria-label="AIX footer">
          <a href="{{ aix_contact_url }}">Contact Us</a>
          <a href="{{ aix_privacy_url }}">Privacy</a>
          <a href="{{ aix_toc_url }}">AIX TOC</a>
        </nav>
      </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
  </body>
</html>
